services:
  librarian:
    build: .
    image: librarian_mcp:latest
    volumes:
      - ./docs:/docs
      - ./data:/data
    environment:
      - DOCUMENT_ARCHIVE_PATH=/docs
      - DATA_PATH=/data
      - BIND_HOST=0.0.0.0
      - PORT=8000
      - OLLAMA_HOST=http://host.docker.internal:11434
      - OLLAMA_EMBED_URL=http://host.docker.internal:11434/api/embed
      - OLLAMA_MODEL=llama3
      - OLLAMA_KEEP_ALIVE=30m
      - OLLAMA_PREWARM=1
      - OLLAMA_PREWARM_TIMEOUT_SEC=12
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    restart: unless-stopped
