version: '3.8'
services:
  librarian:
    build: .
    image: librarian_mcp:latest
    volumes:
      - ./docs:/docs
      - ./data:/data
    environment:
      - DOCUMENT_ARCHIVE_PATH=/docs
      - DATA_PATH=/data
      - BIND_HOST=0.0.0.0
      - PORT=8000
    ports:
      - "8000:8000"
    restart: unless-stopped
